<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng Nhập Quản Trị | KA Homes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: #fff; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .btn-primary { background: #2563eb; border: none; border-radius: 10px; padding: 12px; font-weight: 600; width: 100%; }
    </style>
</head>
<body>
    <div class="auth-box text-center">
        <h3 class="font-weight-bold mb-4 text-primary">KA Homes Admin</h3>
        <div class="form-group">
            <input type="email" id="email" class="form-control" placeholder="Email quản trị" required>
        </div>
        <div class="form-group">
            <input type="password" id="password" class="form-control" placeholder="Mật khẩu" required>
        </div>
        <button id="btnLogin" class="btn btn-primary mb-2">Đăng Nhập</button>
        <button id="btnRegister" class="btn btn-outline-secondary w-100" style="border-radius: 10px;">Đăng Ký (Chỉ dùng lần đầu)</button>
        <p id="message" class="text-danger mt-3 small"></p>
        <a href="index.html" class="d-block mt-3 small text-muted">Quay lại trang chủ</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // Cấu hình Firebase của bạn
        const firebaseConfig = {
            apiKey: "AIzaSyBXBwpbg-eCmwwrNAmJ_4JE5BMB2pbkh3Q",
            authDomain: "kahomes.firebaseapp.com",
            projectId: "kahomes",
            storageBucket: "kahomes.firebasestorage.app",
            messagingSenderId: "504157160650",
            appId: "1:504157160650:web:666b727ba03c0d6888e033",
            measurementId: "G-5YK38ZF6P7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const emailInput = document.getElementById('email');
        const passInput = document.getElementById('password');
        const msg = document.getElementById('message');

        document.getElementById('btnRegister').addEventListener('click', () => {
            createUserWithEmailAndPassword(auth, emailInput.value, passInput.value)
                .then(() => { 
                    alert("Đăng ký tài khoản Admin thành công! Đang chuyển hướng..."); 
                    window.location.href = "admin.html"; 
                })
                .catch((error) => { msg.innerText = error.message; });
        });

        document.getElementById('btnLogin').addEventListener('click', () => {
            signInWithEmailAndPassword(auth, emailInput.value, passInput.value)
                .then(() => { window.location.href = "admin.html"; })
                .catch((error) => { msg.innerText = "Sai email hoặc mật khẩu!"; });
        });
    </script>
</body>
</html>
